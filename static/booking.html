<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сириус.Аренда — Бронирование</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sun-glow"></div>

  <nav class="site-nav">
    <a class="nav-brand" href="index.html">Сириус.Аренда</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Пространства</a>
      <a href="booking.html" class="nav-link active nav-auth-only">Бронь</a>
      <a href="admin.html" class="nav-link nav-admin-only hidden">Админ</a>
      <a href="login.html" class="nav-link" id="login-link">Войти</a>
      <a href="profile.html" class="nav-profile hidden" title="Профиль" aria-label="Профиль">
        <img class="nav-profile-img" src="/ui/avatars/1.svg" alt="">
      </a>
      <button id="logout-btn" class="btn btn-soft btn-sm hidden" type="button">Выйти</button>
    </div>
  </nav>

  <main class="page-main page-narrow">
    <section class="panel">
      <div class="panel-head">
        <h2>Новое бронирование</h2>
      </div>
      <form id="booking-form" class="stack">
        <label>
          <span>Комната</span>
          <select id="booking-room" required></select>
        </label>
        <label>
          <span>Дата и время</span>
          <input type="text" id="booking-start" class="datetime-input" placeholder="Выберите дату и время" readonly required>
        </label>
        <div class="time-quick" tabindex="0">
          <div class="time-duration-controls">
            <button type="button" class="chip chip-step" data-step="-30" aria-label="Уменьшить длительность">−</button>
            <span class="time-duration-current" data-duration-label>Выбрано: 1 час</span>
            <button type="button" class="chip chip-step" data-step="30" aria-label="Увеличить длительность">+</button>
          </div>
        </div>
        <fieldset id="booking-contact" class="booking-contact hidden">
          <legend>Данные для бронирования</legend>
          <p class="hint">Укажите ФИО, телефон и почту — они нужны для подтверждения брони</p>
          <label>
            <span>ФИО</span>
            <input type="text" id="contact-full-name" minlength="3" maxlength="200" placeholder="Фамилия Имя" autocomplete="name">
          </label>
          <label>
            <span>Телефон</span>
            <input type="tel" id="contact-phone" minlength="10" maxlength="30" placeholder="+7 (999) 123-45-67" autocomplete="tel">
          </label>
          <label>
            <span>Почта</span>
            <input type="email" id="contact-email" maxlength="200" placeholder="mail@example.com" autocomplete="email">
          </label>
        </fieldset>
        <button type="submit" class="btn btn-main">Забронировать</button>
      </form>
      <p id="booking-message" class="status"></p>
      <div id="booking-suggestions" class="hidden"></div>
    </section>
  </main>

  <footer>
    <p>НТУ «Сириус» · Сириус.Аренда</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
  <script src="js/common.js"></script>
  <script src="js/features.js"></script>
  <script src="js/datetime-picker.js?v=6"></script>
  <script src="js/suggestions.js?v=3"></script>
  <script src="js/booking.js"></script>
</body>
</html>
